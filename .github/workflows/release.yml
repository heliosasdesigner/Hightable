name: Release

# Builds Hightable for macOS, Windows, and Linux when a version tag is
# pushed (e.g. `git tag v0.1.0 && git push --tags`), then publishes the
# resulting installers to a GitHub Release.
#
# The workflow can also be triggered manually from the Actions tab via
# workflow_dispatch — useful for testing the pipeline without cutting a
# real release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write  # required to create the release and upload assets

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_glob: "release/*.dmg release/*.zip"
          - os: windows-latest
            artifact_glob: "release/*.exe"
          - os: ubuntu-latest
            artifact_glob: "release/*.AppImage"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Linux — install build deps for node-pty / better-sqlite3
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 libx11-dev libxkbfile-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build renderer + main bundle
        run: npm run build

      - name: Package desktop binary
        env:
          # electron-builder will auto-publish if GH_TOKEN is set; we
          # publish ourselves below to keep the matrix simple.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # `npm run package` uses --mac on the package script; call
          # electron-builder directly per-platform instead.
          npx electron-builder --${{ runner.os == 'macOS' && 'mac' || runner.os == 'Windows' && 'win' || 'linux' }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hightable-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/latest*.yml
          if-no-files-found: warn
          retention-days: 7

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact directories
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.dmg" -o -name "*.zip" -o -name "*.exe" -o -name "*.AppImage" -o -name "latest*.yml" \) -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
